name: Problem with the Rive Flutter Runtime
description: Report a bug or unexpected behavior in the Rive Flutter runtime.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for using Rive! Before filing an issue, please:
        - Confirm if the issue is still present on the [latest version of the `rive` package](https://pub.dev/packages/rive/versions)
        - Check the [Rive documentation](https://rive.app/docs/runtimes/flutter/flutter)
        - Search for help on the [Rive community forums](https://community.rive.app/)
        - For feature requests, use the [feature request forum](https://community.rive.app/c/feature-requests/) instead

  - type: checkboxes
    id: preflight
    attributes:
      label: Submission checklist
      options:
        - label: I have confirmed the issue is present in the latest version of the `rive` Flutter package
          required: true
        - label: I have searched the documentation and forums and could not find an answer
          required: true
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What issue are you running into? What's your expected behavior?
      placeholder: Describe the issue you're experiencing
    validations:
      required: true

  - type: textarea
    id: repro-description
    attributes:
      label: Reproduction steps / code
      description: |
        Please provide the most **minimal reproduction** you can. Paste a code snippet if the problem is small enough. Or share a link to a minimal GitHub repository that reproduces the issue.

        Alternatively, you can upload a .zip of your reproduction in the next question.
      placeholder: |
        ```dart
        // paste your code here
        ```
    validations:
      required: false

  - type: upload
    id: repro-files
    attributes:
      label: Upload your reproduction files / stack trace
      description: |
      
        If your reproduction is more complex, you can upload a .zip of your project. 
        Include a file with your stack trace if available as well if you cannot provide it above.
        Please make sure to include a `README` with instructions on how to run the reproduction.

  - type: upload
    id: riv_file
    attributes:
      label: Source `.riv` / `.rev` file
      description: |
        If you are able, attaching the runtime-exported `.riv` file (and ideally the source `.rev` backup) is immensely helpful for reproducing and fixing the issue quickly.

        Note: Use a ZIP archive to upload `.riv`/`.rev` files (GitHub only supports certain file types). You can also share files privately at support@rive.app.
    validations:
      required: false

  - type: upload
    id: screenshots
    attributes:
      label: Screenshots / video
      description: If applicable, add screenshots or a screen recording to help explain the problem.
    validations:
      required: false

  - type: input
    id: rive_version
    attributes:
      label: Rive Flutter package version
      description: Which version of the `rive` package are you using?
      placeholder: "e.g. 0.14.4"
    validations:
      required: true

  - type: textarea
    id: flutter_version
    attributes:
      label: Flutter version
      description: Paste the full output of `flutter --version`
      placeholder: |
        Flutter 3.x.x • channel stable • https://github.com/flutter/flutter.git
        Framework • revision abc123 • ...
        Engine • revision abc123
        Tools • Dart 3.x.x
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 15 Pro, Pixel 7, Android Emulator, iOS Simulator"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. iOS 17.4, Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any other context about the problem (relevant config, platform-specific behavior, etc.).
    validations:
      required: false
